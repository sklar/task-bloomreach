<main class="showcase">
  <h1>Date Range Picker</h1>
  <p>
    A design-system date range picker — a Trigger that opens a two-month calendar with a presets
    sidebar and a footer summary.
  </p>

  <div class="showcase__pickers">
    <bloom-date-range-picker label="Uncontrolled picker" />
    <bloom-date-range-picker
      label="Controlled picker"
      [value]="controlledRange()"
      (applied)="controlledRange.set($event)"
    />
  </div>
</main>
